version: "3.8"

services:
  suitecrm:
    build:
      context: ./docker/suitecrm
      dockerfile: Dockerfile
    image: suitecrm-docker-suitecrm
    container_name: suitecrm_app
    restart: unless-stopped
    user: "0:0"
    volumes:
      - app_code:/var/www/html
      - suitecrm_uploads:/var/www/html/upload
      - ./docker/suitecrm/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/suitecrm/entrypoint.sh:/usr/local/bin/entrypoint.sh
    environment:
      - PHP_MEMORY_LIMIT=512M
      - PHP_MAX_EXECUTION_TIME=300
      - PHP_UPLOAD_MAX_FILESIZE=30M
      - PHP_POST_MAX_SIZE=30M
      - DATABASE_URL=mysql://root:rootpassword@db:3306/suitecrm_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - suitecrm_network

  db:
    image: mysql:8.0
    platform: linux/amd64
    container_name: suitecrm_db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=suitecrm_db
      - MYSQL_USER=suitecrm_user
      - MYSQL_PASSWORD=suitecrm_password
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=1G
      --max-connections=100
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - suitecrm_network

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: suitecrm_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - suitecrm_network

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    image: suitecrm-docker-nginx
    container_name: suitecrm_nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - app_code:/var/www/html:ro
      - suitecrm_uploads:/var/www/html/upload:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_confd:/etc/nginx/conf.d:ro
      - ssl_certs:/etc/nginx/ssl:ro
    depends_on:
      - suitecrm
    networks:
      - suitecrm_network

networks:
  suitecrm_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  app_code:
    name: suitecrm_app_code
    external: true
  mysql_data:
    driver: local
  redis_data:
    driver: local
  suitecrm_uploads:
    driver: local
  nginx_confd:
    name: suitecrm_nginx_confd
    external: true
  ssl_certs:
    name: suitecrm_ssl_certs
    external: true
