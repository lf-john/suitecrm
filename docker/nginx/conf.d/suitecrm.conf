# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name crm.logicalfront.com localhost;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name crm.logicalfront.com localhost;
    root /var/www/html/public;
    index index.php index.html index.htm;

    # SSL configuration
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 100M;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Handle SuiteCRM v8 routes
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # PHP processing via PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass suitecrm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # API and GraphQL routes
    location /api { try_files $uri $uri/ /index.php$is_args$args; }
    location /graphql { try_files $uri $uri/ /index.php$is_args$args; }
    location /service { try_files $uri $uri/ /index.php$is_args$args; }

    # Deny access to sensitive files
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~ composer\.(json|lock) { deny all; }
    location ~ package(-lock)?\.json { deny all; }
    location ~ \.env { deny all; }
    location ~ ^/(cache|tmp)/ { deny all; }
    location ~ ^/upload/.*\.php$ { deny all; }
}
